<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件整理工作台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=JetBrains+Mono&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
    <link href="/assets/app.css" rel="stylesheet">
</head>
<body>

<header class="header">
    <a class="header-logo" href="/">
        <span class="header-logo-icon">🗂</span>
        文件整理工作台
        <span class="header-badge">v0.2</span>
    </a>
    <div class="header-stats" id="headerStats">
        <span class="header-stat">
            当前: <span class="header-stat-number" id="statPath">—</span>
        </span>
        <span class="header-stat">
            文件: <span class="header-stat-number" id="statFiles">0</span>
        </span>
        <span class="header-stat" id="statDupRow" style="display:none">
            重复: <span class="header-stat-number" id="statDup">0</span>
        </span>
    </div>
</header>

<div class="app-body">

<aside class="sidebar">
    <div class="panel">
        <div class="panel-header">
            <span>📂 目录</span>
        </div>
        <div class="panel-body" style="padding-bottom:10px">
            <div class="input-group">
                <input type="text" id="pathInput" placeholder="输入目录路径..." autocomplete="off">
                <button class="btn btn-primary" id="scanBtn">扫描</button>
            </div>
            <div id="scanStatus" class="scan-status scan-status-info" style="display:none"></div>
        </div>
        <div class="panel-footer" style="padding:8px 16px">
            <button class="btn btn-warning-outline btn-sm btn-w-full" id="dupBtn">🔍 检测重复文件</button>
        </div>
    </div>

    <div class="panel" id="rulePanel" style="display:none">
        <div class="panel-header">
            <span>⚙️ 规则</span>
        </div>
        <div class="panel-body" style="padding-bottom:10px">
            <div class="form-check">
                <input type="checkbox" id="ruleRemoveSpaces">
                <label for="ruleRemoveSpaces">去空格</label>
            </div>
            <div class="form-check">
                <input type="checkbox" id="ruleRemoveSpecial">
                <label for="ruleRemoveSpecial">去特殊字符</label>
            </div>
            <div class="form-check">
                <input type="checkbox" id="ruleLowercase">
                <label for="ruleLowercase">统一小写</label>
            </div>
            <div class="form-check">
                <input type="checkbox" id="ruleDatePrefix">
                <label for="ruleDatePrefix">加日期前缀</label>
            </div>
            <div class="form-check">
                <input type="checkbox" id="ruleSequence">
                <label for="ruleSequence">序号填充</label>
            </div>
            <div class="form-check">
                <input type="checkbox" id="ruleExtLowercase">
                <label for="ruleExtLowercase">扩展名小写</label>
            </div>
            <div class="form-check">
                <input type="checkbox" id="ruleCategorize">
                <label for="ruleCategorize">按类型归档 <span class="form-help">移入 images/docs/ 等子目录</span></label>
            </div>
            <div class="form-check" style="margin-bottom:10px">
                <input type="checkbox" id="ruleTimeArchive">
                <label for="ruleTimeArchive">按时间归档 <span class="form-help">按修改日期移入 YYYY/MM/</span></label>
            </div>

            <div class="form-label" style="margin-bottom:6px">查找替换</div>
            <div class="input-group" style="margin-bottom:12px">
                <input type="text" class="input-group-sm" id="ruleFind" placeholder="查找" style="width:50%">
                <span class="input-group-text" style="border-radius:0">→</span>
                <input type="text" class="input-group-sm" id="ruleReplace" placeholder="替换为" style="width:50%">
            </div>

            <div class="form-label" style="margin-bottom:6px">模板</div>
            <div class="input-group" style="margin-bottom:6px">
                <select class="form-select" id="templateSelect">
                    <option value="">加载模板...</option>
                </select>
                <button class="btn btn-ghost btn-sm" id="deleteTemplateBtn" style="display:none" title="删除模板">✕</button>
            </div>
            <button class="btn btn-secondary btn-sm btn-w-full" id="saveTemplateBtn">保存当前规则为模板</button>
        </div>
        <div class="panel-footer">
            <div class="form-check">
                <input type="checkbox" id="dryRun" checked>
                <label for="dryRun" style="color:var(--success);font-weight:600">Dry-run 模式 <span class="form-help">只预览不执行</span></label>
            </div>
            <button class="btn btn-primary btn-w-full" id="previewBtn" disabled style="margin-top:8px">预览</button>
        </div>
    </div>
</aside>

<main class="main" id="mainContent">

    <div id="welcomePanel" class="panel">
        <div class="empty-state">
            <div class="empty-state-icon">🗂</div>
            <div class="empty-state-title">选择目录开始整理文件</div>
            <div class="empty-state-desc">
                在左侧输入目录路径 → 点扫描 → 勾选文件 → 配置规则 → 预览确认 → 执行改名。<br>
                所有操作默认 Dry-run，确认后才真正执行。
            </div>
        </div>
    </div>

    <div class="panel" id="filePanel" style="display:none">
        <div class="panel-header">
            <span>📄 文件列表</span>
            <div class="panel-actions" style="gap:4px">
                <input type="text" id="extFilter" placeholder="扩展名筛选" class="input-group-sm" style="width:130px;padding:3px 8px;font-size:12px">
                <button class="btn btn-secondary btn-sm" id="filterBtn">筛选</button>
                <span class="text-muted" style="font-size:12px;font-weight:400;text-transform:none" id="fileCount"></span>
            </div>
        </div>
        <div class="panel-body-flush">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:40px"><input type="checkbox" id="selectAll"></th>
                            <th>文件名称</th>
                            <th style="width:90px">大小</th>
                            <th style="width:80px">类型</th>
                            <th style="width:150px">修改时间</th>
                        </tr>
                    </thead>
                    <tbody id="fileBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="panel" id="previewPanel" style="display:none">
        <div class="panel-header">
            <span>👁 预览</span>
            <div class="panel-actions">
                <span id="previewSummary" class="text-muted" style="font-size:12px;font-weight:400;text-transform:none"></span>
            </div>
        </div>
        <div class="panel-body-flush">
            <div class="table-wrap" style="max-height:300px">
                <table>
                    <thead>
                        <tr><th>原名</th><th style="width:40px"></th><th>新名</th><th style="width:70px">状态</th></tr>
                    </thead>
                    <tbody id="previewBody"></tbody>
                </table>
            </div>
        </div>
        <div class="panel-footer" style="display:flex;justify-content:flex-end">
            <button class="btn btn-success" id="executeBtn" style="display:none">执行改名</button>
        </div>
    </div>

    <div class="panel" id="progressPanel" style="display:none">
        <div class="panel-header"><span>⏳ 处理进度</span></div>
        <div class="panel-body">
            <div class="progress">
                <div class="progress-bar progress-bar-striped" id="progressBar" style="width:0%">0%</div>
            </div>
            <div class="text-center text-muted small mt-2" id="progressText">处理中...</div>
        </div>
    </div>

    <div class="panel" id="resultPanel" style="display:none">
        <div class="panel-header">
            <span>✅ 执行结果</span>
            <span class="text-muted" id="resultSummary" style="font-size:12px;font-weight:400;text-transform:none"></span>
        </div>
        <div class="panel-body-flush">
            <div class="table-wrap" style="max-height:300px">
                <table>
                    <thead>
                        <tr><th>原名</th><th>新名</th><th style="width:90px">状态</th><th>说明</th></tr>
                    </thead>
                    <tbody id="resultBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="panel" id="dupPanel" style="display:none">
        <div class="panel-header">
            <span>🔁 重复文件</span>
            <span class="text-muted" id="dupSummary" style="font-size:12px;font-weight:400;text-transform:none"></span>
        </div>
        <div class="panel-body-flush">
            <div class="table-wrap" style="max-height:400px">
                <table>
                    <thead>
                        <tr><th style="width:40px"><input type="checkbox" id="selectAllDup"></th><th>文件</th><th style="width:90px">大小</th><th style="width:70px">状态</th></tr>
                    </thead>
                    <tbody id="dupBody"></tbody>
                </table>
            </div>
        </div>
        <div class="panel-footer" id="dupFooter" style="display:none;justify-content:flex-end">
            <button class="btn btn-danger" id="deleteDupBtn">删除选中重复文件</button>
        </div>
    </div>

</main>
</div>

<div class="bottom-bar">
    <div class="panel" style="border:none;box-shadow:none;border-radius:0;margin:0">
        <div class="panel-header">
            <span>📋 操作日志</span>
            <button class="btn btn-ghost btn-sm" id="refreshLogsBtn">刷新</button>
        </div>
        <div class="panel-body-flush">
            <div id="logBody" style="max-height:220px;overflow-y:auto">
                <div class="text-center text-muted py-3">暂无操作记录</div>
            </div>
        </div>
    </div>
</div>

<script src="/assets/app.js"></script>
</body>
</html>
