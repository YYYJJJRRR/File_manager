<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件整理工作台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/app.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid py-4" id="app">
        <div class="row mb-4">
            <div class="col">
                <h1 class="d-flex align-items-center gap-2">
                    <span>🗂</span>
                    <span>文件整理工作台</span>
                    <span class="badge bg-secondary fs-6 ms-2">v0.1</span>
                </h1>
                <p class="text-muted">选择目录 → 配置规则 → 预览 → 执行</p>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-header">目录选择</div>
                    <div class="card-body">
                        <div class="input-group">
                            <input type="text" class="form-control" id="pathInput" placeholder="输入或粘贴路径">
                            <button class="btn btn-outline-secondary" type="button" id="scanBtn">扫描</button>
                        </div>
                        <div id="scanStatus" class="mt-2"></div>
                        <button class="btn btn-outline-warning btn-sm w-100 mt-2" id="dupBtn">🔍 检测重复文件</button>
                    </div>
                </div>

                <div class="card mb-3" id="rulePanel" style="display:none">
                    <div class="card-header">重命名规则</div>
                    <div class="card-body">
                        <div class="form-check mb-2">
                            <input class="form-check-input rule-checkbox" type="checkbox" id="ruleRemoveSpaces">
                            <label class="form-check-label" for="ruleRemoveSpaces">去空格</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input rule-checkbox" type="checkbox" id="ruleRemoveSpecial">
                            <label class="form-check-label" for="ruleRemoveSpecial">去特殊字符</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input rule-checkbox" type="checkbox" id="ruleLowercase">
                            <label class="form-check-label" for="ruleLowercase">统一小写</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input rule-checkbox" type="checkbox" id="ruleDatePrefix">
                            <label class="form-check-label" for="ruleDatePrefix">加日期前缀</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input rule-checkbox" type="checkbox" id="ruleSequence">
                            <label class="form-check-label" for="ruleSequence">序号填充</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input rule-checkbox" type="checkbox" id="ruleExtLowercase">
                            <label class="form-check-label" for="ruleExtLowercase">扩展名小写</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input rule-checkbox" type="checkbox" id="ruleCategorize">
                            <label class="form-check-label" for="ruleCategorize">按类型归档</label>
                            <small class="text-muted d-block">移入 images/docs/videos/ 等子目录</small>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input rule-checkbox" type="checkbox" id="ruleTimeArchive">
                            <label class="form-check-label" for="ruleTimeArchive">按时间归档</label>
                            <small class="text-muted d-block">按修改日期移入 YYYY/MM/ 文件夹</small>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small mb-1">查找替换</label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control" id="ruleFind" placeholder="查找">
                                <span class="input-group-text">→</span>
                                <input type="text" class="form-control" id="ruleReplace" placeholder="替换为">
                            </div>
                        </div>
                        <hr>
                        <div class="mb-2">
                            <label class="form-label small mb-1">规则模板</label>
                            <div class="d-flex gap-1 mb-1">
                                <select class="form-select form-select-sm" id="templateSelect">
                                    <option value="">加载模板...</option>
                                </select>
                                <button class="btn btn-outline-danger btn-sm" id="deleteTemplateBtn" title="删除当前模板" style="display:none">✕</button>
                            </div>
                            <button class="btn btn-outline-secondary btn-sm w-100" id="saveTemplateBtn">保存当前规则为模板</button>
                        </div>
                        <hr>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="dryRun" checked>
                            <label class="form-check-label text-success" for="dryRun"><strong>Dry-run 模式</strong></label>
                        </div>
                        <button class="btn btn-primary w-100 mt-2" id="previewBtn" disabled>预览</button>
                    </div>
                </div>

            </div>

            <div class="col-md-8">
                <div id="welcomePanel" class="card mb-3">
                    <div class="card-body text-center py-5">
                        <div style="font-size:48px">🗂</div>
                        <h4 class="mt-3">选择目录开始整理文件</h4>
                        <p class="text-muted">在左侧输入路径 → 点扫描 → 勾选文件 → 配置规则 → 预览 → 执行</p>
                    </div>
                </div>
                <div class="card mb-3" id="filePanel" style="display:none">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>文件列表</span>
                        <span class="text-muted small" id="fileCount"></span>
                    </div>
                    <div class="card-body p-2 border-bottom">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text">扩展名筛选</span>
                            <input type="text" class="form-control" id="extFilter" placeholder="如 jpg,png,pdf（留空显示全部）">
                            <button class="btn btn-outline-secondary" type="button" id="filterBtn">筛选</button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height:400px;overflow-y:auto">
                            <table class="table table-hover mb-0" id="fileTable">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width:40px"><input type="checkbox" id="selectAll"></th>
                                        <th>名称</th>
                                        <th style="width:100px">大小</th>
                                        <th style="width:100px">扩展名</th>
                                        <th style="width:160px">修改时间</th>
                                    </tr>
                                </thead>
                                <tbody id="fileBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="card mb-3" id="previewPanel" style="display:none">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>预览</span>
                        <button class="btn btn-success btn-sm" id="executeBtn">执行</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height:300px;overflow-y:auto">
                            <table class="table table-hover mb-0" id="previewTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>原名</th>
                                        <th style="width:40px"></th>
                                        <th>新名</th>
                                        <th style="width:80px">状态</th>
                                    </tr>
                                </thead>
                                <tbody id="previewBody"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer text-muted small text-end" id="previewSummary"></div>
                </div>

                <div class="card mb-3" id="progressPanel" style="display:none">
                    <div class="card-header">执行进度</div>
                    <div class="card-body">
                        <div class="progress" style="height:24px">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" id="progressBar" role="progressbar" style="width:0%">0%</div>
                        </div>
                        <div class="text-center text-muted small mt-1" id="progressText">处理中...</div>
                    </div>
                </div>
                <div class="card mb-3" id="resultPanel" style="display:none">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>执行结果</span>
                        <span id="resultSummary"></span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height:300px;overflow-y:auto">
                            <table class="table table-hover mb-0" id="resultTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>原名</th>
                                        <th>新名</th>
                                        <th style="width:100px">状态</th>
                                        <th>说明</th>
                                    </tr>
                                </thead>
                                <tbody id="resultBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="card mb-3" id="dupPanel" style="display:none">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>重复文件检测</span>
                        <span id="dupSummary" class="text-muted small"></span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height:400px;overflow-y:auto">
                            <table class="table table-hover mb-0" id="dupTable">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width:40px"><input type="checkbox" id="selectAllDup"></th>
                                        <th>文件</th>
                                        <th style="width:80px">大小</th>
                                        <th style="width:100px">状态</th>
                                    </tr>
                                </thead>
                                <tbody id="dupBody"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer d-flex justify-content-end gap-2" id="dupFooter" style="display:none">
                        <button class="btn btn-danger btn-sm" id="deleteDupBtn">删除选中重复文件</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card mb-3" id="logPanel">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>操作日志</span>
                        <button class="btn btn-outline-secondary btn-sm" id="refreshLogsBtn">刷新</button>
                    </div>
                    <div class="card-body p-0">
                        <div style="max-height:300px;overflow-y:auto" id="logBody">
                            <div class="text-center text-muted py-3">暂无操作记录</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/app.js"></script>
</body>
</html>
